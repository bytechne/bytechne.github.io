name: 검도 대회 일정 자동 업데이트

on:
  schedule:
    # 매주 월요일 오전 9시 (한국 시간) 실행
    # GitHub Actions 시간은 UTC 기준 → KST = UTC+9 → UTC 00:00 = KST 09:00
    - cron: "0 0 * * 1"

  # 수동 실행 버튼 (GitHub 웹에서 직접 실행 가능)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # 1. 레포지토리 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 필요한 라이브러리 설치
      - name: 라이브러리 설치
        run: |
          pip install requests beautifulsoup4

      # 4. 크롤러 실행
      - name: 크롤러 실행
        run: python crawler.py

      # 5. events.json 변경사항 커밋 & 푸시
      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          # 변경사항 없으면 커밋 안 함 (오류 방지)
          git diff --staged --quiet || git commit -m "자동 업데이트: 검도 대회 일정 $(date +'%Y-%m-%d')"
          git push
